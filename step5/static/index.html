<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Tutor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 12px 20px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ── chat column ── */
    .chat-col {
      flex: 3;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #e0e0e0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 0.95rem;
    }
    .msg.user   { align-self: flex-end; background: #1a1a1a; color: #fff; border-radius: 12px 12px 2px 12px; }
    .msg.tutor  { align-self: flex-start; background: #f0f0f0; border-radius: 12px 12px 12px 2px; }
    .msg.system { align-self: center; color: #888; font-size: 0.8rem; background: none; }

    .input-row {
      display: flex;
      padding: 12px 16px;
      gap: 8px;
      border-top: 1px solid #e0e0e0;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }
    #msg-input:focus { border-color: #1a1a1a; }

    #send-btn {
      padding: 10px 20px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── panels column ── */
    .panels-col {
      flex: 2;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
      gap: 12px;
      background: #fafafa;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 10px;
    }

    /* xp */
    .xp-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .xp-level { font-size: 1.2rem; font-weight: 700; }
    .xp-total { font-size: 0.85rem; color: #555; }
    .xp-bar { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
    .xp-fill { height: 100%; background: #1a1a1a; border-radius: 3px; transition: width 0.4s; }
    .xp-sub  { font-size: 0.75rem; color: #888; margin-top: 4px; }

    /* vocab */
    .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
    .vocab-item:last-child { border-bottom: none; }
    .vocab-es { font-weight: 600; margin-right: 8px; }
    .vocab-en { color: #555; font-size: 0.9rem; }
    .dots { display: flex; gap: 3px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #e0e0e0; }
    .dot.on { background: #1a1a1a; }

    /* grammar */
    .gram-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    .gram-item:last-child { border-bottom: none; }
    .pill { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .pill.introduced  { background: #fff3cd; color: #856404; }
    .pill.practising  { background: #cce5ff; color: #004085; }
    .pill.comfortable { background: #d4edda; color: #155724; }

    /* journey */
    .journey-text { font-size: 0.85rem; line-height: 1.6; color: #333; white-space: pre-wrap; }

    .empty { color: #aaa; font-size: 0.85rem; font-style: italic; }
  </style>
</head>
<body>

<header>Language <strong>Tutor</strong></header>

<div class="layout">

  <!-- chat -->
  <div class="chat-col">
    <div id="messages">
      <div class="msg system">Session starting…</div>
    </div>
    <div class="input-row">
      <input id="msg-input" type="text" placeholder="Type in Spanish or English, then Enter…" disabled />
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <!-- panels -->
  <div class="panels-col">

    <div class="card" id="xp-card">
      <div class="card-title">Progress</div>
      <div class="xp-row">
        <span class="xp-level">Level <span id="xp-level">1</span></span>
        <span class="xp-total" id="xp-total">0 XP</span>
      </div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
      <div class="xp-sub" id="xp-sub">0 / 100 to level 2</div>
    </div>

    <div class="card">
      <div class="card-title">Recent words</div>
      <div id="vocab-list"><div class="empty">No words yet — say hola!</div></div>
    </div>

    <div class="card">
      <div class="card-title">Grammar</div>
      <div id="grammar-list"><div class="empty">No grammar yet.</div></div>
    </div>

    <div class="card">
      <div class="card-title">Learning journey</div>
      <div id="journey-text" class="journey-text empty">Your learning plan will appear here as we go.</div>
    </div>

  </div>
</div>

<script>
  const API = '';  // same origin
  let sessionId = localStorage.getItem('tutor_session_id');

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');

  // ── helpers ──────────────────────────────────────────────────────

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function setReady(yes) {
    inputEl.disabled = !yes;
    sendBtn.disabled = !yes;
    if (yes) inputEl.focus();
  }

  // ── session ───────────────────────────────────────────────────────

  async function ensureSession() {
    const url = sessionId
      ? `${API}/session?user_id=${encodeURIComponent(sessionId)}`
      : `${API}/session`;
    const res = await fetch(url, { method: 'POST' });
    const data = await res.json();
    sessionId = data.session_id;
    localStorage.setItem('tutor_session_id', sessionId);
  }

  // ── chat ─────────────────────────────────────────────────────────

  async function sendMessage(text) {
    if (!text.trim()) return;
    setReady(false);
    inputEl.value = '';

    addMsg('user', text);
    const tutorDiv = addMsg('tutor', '…');

    const res = await fetch(`${API}/chat/${sessionId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let reply = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();   // keep incomplete last line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const evt = JSON.parse(line.slice(6));
        if (evt.type === 'chunk') {
          reply += evt.text;
          tutorDiv.textContent = reply;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    }

    setReady(true);
  }

  sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(inputEl.value); });

  // ── panels ────────────────────────────────────────────────────────

  function renderXP({ level, total, into }) {
    document.getElementById('xp-level').textContent = level;
    document.getElementById('xp-total').textContent = `${total} XP`;
    document.getElementById('xp-fill').style.width = `${into}%`;
    document.getElementById('xp-sub').textContent = `${into} / 100 to level ${level + 1}`;
  }

  function renderVocab(words) {
    const el = document.getElementById('vocab-list');
    if (!words.length) { el.innerHTML = '<div class="empty">No words yet — say hola!</div>'; return; }
    el.innerHTML = words.map(w => {
      const es   = (w.es || w.word || '').replace(/</g, '&lt;');
      const en   = (w.en || w.translation || '').replace(/</g, '&lt;');
      const conf = Math.min(5, Math.max(0, parseInt(w.confidence) || 1));
      const dots = Array.from({length: 5}, (_, i) =>
        `<div class="dot ${i < conf ? 'on' : ''}"></div>`).join('');
      return `<div class="vocab-item">
        <div><span class="vocab-es">${es}</span><span class="vocab-en">${en}</span></div>
        <div class="dots">${dots}</div>
      </div>`;
    }).join('');
  }

  function renderGrammar(topics) {
    const el = document.getElementById('grammar-list');
    if (!topics.length) { el.innerHTML = '<div class="empty">No grammar yet.</div>'; return; }
    el.innerHTML = topics.slice(-8).map(t => {
      const topic  = (t.topic || '?').replace(/</g, '&lt;');
      const status = (t.status || 'introduced').toLowerCase();
      const cls    = ['introduced','practising','comfortable'].includes(status) ? status : 'introduced';
      return `<div class="gram-item"><span>${topic}</span><span class="pill ${cls}">${status}</span></div>`;
    }).join('');
  }

  function renderJourney(text) {
    const el = document.getElementById('journey-text');
    if (!text) { el.className = 'journey-text empty'; el.textContent = 'Your learning plan will appear here as we go.'; return; }
    el.className = 'journey-text';
    el.textContent = text;
  }

  async function refreshPanels() {
    if (!sessionId) return;
    try {
      const res = await fetch(`${API}/panels/${sessionId}`);
      if (!res.ok) return;
      const data = await res.json();
      renderXP(data.xp);
      renderVocab(data.vocab);
      renderGrammar(data.grammar);
      renderJourney(data.journey);
    } catch (_) {}
  }

  // ── boot ──────────────────────────────────────────────────────────

  (async () => {
    try {
      await ensureSession();
      const sys = messagesEl.querySelector('.msg.system');
      if (sys) sys.textContent = `Session ready. Whenever you're ready to start your lesson, just say hello!`;
      setReady(true);
      await refreshPanels();
      setInterval(refreshPanels, 2000);
    } catch (err) {
      const sys = messagesEl.querySelector('.msg.system');
      if (sys) sys.textContent = `Could not connect to the tutor server: ${err.message}`;
    }
  })();
</script>

</body>
</html>
